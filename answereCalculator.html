<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const answers = [
        "If we have each other",
        "Parlami",
        "Acquario",

        "Olly",
        "Quel filo che ci unisce",
        "Poetica",

        "L'anima balla",
        "Ultimo",
        "De anima",

        "Quei ricordi là",
        "Fino alle 7",
        "Ipocondria",

        "Nayt",
        "La stella più fragile dell'universo",
        "Buttare buttare",

        "Brother",
        "One more light",
        "Balada",
      ];
      const messaggio =
        "Sare come ben sai per me la musica è importantissima e ogni canzone racchiude un significato che va oltre il semplice testo.<br>Quando ascolto 'Parlami' ripenso a due bambini dentro a una camera da letto a cantare a squarciagola.<br>Quando ascolto 'Quel filo che ci unisce' ripenso a una ragazzina che piange tra le mie braccia.<br>Con 'Fino alle 7' a due ragazzi che si vogliono sfogare.<br>Poi ce ne sono altre: 'If we have each other', che fa tornare in mente il discorso che ti avevo fatto su come volessi che fosse il tuo futuro; 'Quei ricordi là', dove eri diventata un'ancora di riposo dalle notti dove non riuscivo a togliermi ja dalla testa; e per finire 'Brother' che a momenti mi faceva emozionare davanti a mia madre...<br>Oltre a queste, spero che potrò aggiungere tante altre canzoni al nostro legame così, un giorno, magari, potranno essere una vera e propria playlist dove potremmo ripercorrere tutti i momenti vissuti insieme.";

    
      getCipherMessage();
      async function getCipherMessage() {
        let app = messaggio;

        const password = "16/07/2025";

        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
          "raw",
          enc.encode(password),
          { name: "PBKDF2" },
          false,
          ["deriveKey"],
        );

        const key = await crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            salt: enc.encode("compleanno_saretta"),
            iterations: 100000,
            hash: "SHA-256",
          },
          keyMaterial,
          { name: "AES-CTR", length: 256 },
          true,
          ["encrypt"],
        );

        let results = [];

        for (let testo of answers) {
          const counter = crypto.getRandomValues(new Uint8Array(16));

          const encrypted = await crypto.subtle.encrypt(
            {
              name: "AES-CTR",
              counter: counter,
              length: 64,
            },
            key,
            enc.encode(testo.trim().toLowerCase()),
          );

          // base64
          const enc64 = btoa(String.fromCharCode(...new Uint8Array(encrypted)));
          const counter64 = btoa(String.fromCharCode(...counter));

          results.push({
            encrypted: enc64,
            counter: counter64,
          });
        }

        console.log(results);
      }
    </script>
  </body>
</html>
