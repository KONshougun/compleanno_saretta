<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>quiz</title>

    <style>
      /* (tutto il tuo CSS invariato) */
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 40px;
        min-height: 100vh;
      }

      .container {
        background: white;
        padding: 20px;
        border-radius: 16px;
        width: 80%;
        max-width: 375px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      .contatore {
        font-size: 14px;
        color: #555;
        margin-bottom: 15px;
      }

      .testo {
        font-size: 16px;
        margin-bottom: 15px;
        line-height: 1.5;
        text-align: left;
      }

      .sezione {
        margin-bottom: 20px;
        text-align: left;
      }

      input[type="text"] {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 14px;
        margin-bottom: 15px;
      }

      .btn {
        width: 40%;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background-color: #ff6f91;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }

      .popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .popup-content {
        background: white;
        padding: 20px;
        border-radius: 16px;
        width: 80%;
        max-width: 300px;
        max-height: 70%;
        overflow-y: auto;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="contatore" id="contatore"></div>

      <div id="question" class="testo"></div>

      <!-- Input + invia affiancati -->
      <div class="sezione" style="display: flex; gap: 10px">
        <input
          id="inputRisposta"
          type="text"
          placeholder="Scrivi qui..."
          style="flex: 1; margin-bottom: 0;"
        />
        <button class="btn" style="width: auto" onclick="inviaRisposta()">
          Invia
        </button>
      </div>
      <br>
      <!-- Bottoni sotto -->
      <div style="display: flex; justify-content: space-between; gap: 10px">
        <button style="margin-left: 8%;" class="btn" onclick="mostraInfo()">Visualizza messaggio</button>
        <button style="margin-right: 8%;" class="btn" onclick="confermaSuggerimento()">Suggerimento</button>
      </div>

    <!-- Popup INFO -->
    <div id="popupInfo" class="popup hidden">
      <div class="popup-content">
        <p id="messaggio"></p>
        <button onclick="chiudiPopup('popupInfo')">OK</button>
      </div>
    </div>

    <!-- Popup CONFERMA -->
    <div id="popupConferma" class="popup hidden">
      <div class="popup-content">
        <p>Vuoi davvero usare il suggerimento?</p>
        <button onclick="mostraSuggerimento()">Sì</button>
        <button onclick="chiudiPopup('popupConferma')">No</button>
      </div>
    </div>

    <!-- Popup SUGGERIMENTO -->
    <div id="popupSuggerimento" class="popup hidden">
      <div class="popup-content">
        <p id="testoSuggerimento"></p>
        <button onclick="chiudiPopup('popupSuggerimento')">OK</button>
      </div>
    </div>

    <script>
      //const difficolta = parseInt(localStorage.getItem("difficolta"));
      const difficolta = 2;
      /*if(!difficolta){
          window.location.href =
            "https://konshougun.github.io/compleanno_saretta/index.html";
      }*/
      const password = "16/07/2025";
      const enc = new TextEncoder();
      const dec = new TextDecoder();

      const domande = [
        "Qual è stata la prima canzone che ti ho dedicato??",
        "In erasmus noi due siamo andati nella stanza delle birre a 'cantare' insieme, cosa stavamo cantando??",
        "Ultimo di recente ha scritto una canzone che ha dedicato sia a me che a lui, come si chiama??",

        "Qual è il tuo cantante preferito??",
        "Durante il compleanno di Jasmine con molta felicità ci siamo messi a cantare una canzone, quale??",
        "In erasmus c'era sempre una canzone che voi ragazze chiedevate, ed è??",

        "Come si chiama la canzone che ti sei tatuata??",
        "Qual è il cantante che possiamo dire che ci ha legato di più in assoluto??",
        "Come si chiama la mia canzone preferita??",

        "Come si chiama la seconda canzone che ti ho dedicato??",
        "Durante Halloween mentre passeggiavamo ci siamo messi a cantare una canzone, quale??",
        "Qual è la canzone di ultimo che io e cri mettavamo sempre??",

        "Qual è il mio cantante preferito??",
        "Come si chiama la canzone che ho dedicato a Jasmine??",
        "Semmai dovessi tatuarmi una canzone, come si chiama quella che avrei voluto farmi??",

        "Qual è la canzone che mi hai dedicato??",
        "C'è una canzone dei linkin park che se dovessi ascoltare nel momento sbagliato potrei mettermi a piangere, qual è??",
        "In erasmus ogni serata la facevamo iniziare con una canzone, come si chiamava??",
      ];
      
      const answers = [
        {encrypted: 'UZ9JTEVfWYVNgUf2jXGxT0tpU8oi', counter: 'KdzzHlHcd2uJRPWXbgg5oA=='},
        {encrypted: 'xHpJbziClw==', counter: 'LCC8WYX0cxgZsqOr/C4wnA=='},
        {encrypted: 'EGJnNXYI5mw=', counter: 'UQMm71aOvH4Pr6xlmGwWWA=='},
        {encrypted: '+sHpsQ==', counter: 'WkKLbewNyykjBXvRR+z8wg=='},
        {encrypted: 'ckn8dGbSdqy9YnKpYAFiAeeDYEBnE3g=', counter: 'lG3b6f0IbO0NyOBY+E89uw=='},
        {encrypted: 'wlkn/OvGNw==', counter: 'zKvmw40oAbP9bn6qbx88DQ=='},
        {encrypted: 'g0/iTyZi7a23tq92kw==', counter: 'GHZDK6S2ulAQv8/I0v+V2g=='},
        {encrypted: 'dBpwQ1V1', counter: '+EZEQp2wBh06kIWAKK3XSA=='},
        {encrypted: 'm4zRB70Etbk=', counter: 'KP/x12YRrKFbWsrneUsJyw=='},
        {encrypted: 'vhDzEGf3rWAjuY/Frm/T2g==', counter: '2AEO1FodMjCWYEElqXCuHg=='},
        {encrypted: 'lNyLJ62aIqVfXww=', counter: 'BKY0IPCn3tnmVizYk6FJ0w=='},
        {encrypted: '9WmWslplTzmRFw==', counter: 'YxaYEhwt/VKGEK+G8c5pLg=='},
        {encrypted: 'rBLwvg==', counter: 'NpMAz5BA7QM7GET5bD5pUw=='},
        {encrypted: 'AHCcdMgRSfN+Athd0CIKENAzwiL2LLtyfE4QhptBDoopZl6J', counter: 'kwJoPM30B4K3W0SxyvrNHg=='},
        {encrypted: 'ganobjKNVpSNoSkBF5PI', counter: 'ZEqFTlgLrC4hY6+zDWijSA=='},
        {encrypted: 'ZLEtYeYMkQ==', counter: 'TgnlA8cJwLjRYyp9K4CRww=='},
        {encrypted: 'y4Q9vhQNXh1SmpILjmA=', counter: '/ch9L854l03aNNGbTaWjZQ=='},
        {encrypted: 'm1oKds3v', counter: 'YgYdYycAuYj2tOyymCcyAw=='}
      ];

      let key;
      let messaggio = "";
      let currentStep = 1;
      let domandaIndex = 0;
      let totalSteps = 6 * difficolta;
      setCounter();
      setQuestion();
      init();

      async function init() {
        key = await getKey();
      }
      async function getKey(){
        const keyMaterial = await crypto.subtle.importKey(
            "raw",
            enc.encode(password),
            { name: "PBKDF2" },
            false,
            ["deriveKey"]
        );

        return await crypto.subtle.deriveKey(
            {
                name: "PBKDF2",
                salt: enc.encode("compleanno_saretta"),
                iterations: 100000,
                hash: "SHA-256",
            },
            keyMaterial,
            { name: "AES-CTR", length: 256 },
            true,
            ["decrypt"]
        );
      }

      function setQuestion(){
        let index = currentStep - 1;
        let block = Math.floor(index / difficolta);
        let offset = index % difficolta;
        domandaIndex = block * 3 + offset;
        document.getElementById("question").textContent = domande[domandaIndex];
      }

      function setCounter() {
        document.getElementById("contatore").textContent =
          `${currentStep}/${totalSteps}`;
      }

      function chiudiPopup(id) {
        document.getElementById(id).classList.add("hidden");
      }

      function mostraMessaggio() {
        document.getElementById("messaggio").textContent = messaggio;
        document.getElementById("popupInfo").classList.remove("hidden");
      }

      function confermaSuggerimento() {
        document.getElementById("popupConferma").classList.remove("hidden");
      }

      function mostraSuggerimento() {
        chiudiPopup("popupConferma");

        if (difficolta != 3 || currentStep % 3 != 0) {
          const suggerimento = "Mo ti meno!!";
          document.getElementById("testoSuggerimento").textContent =
            suggerimento;
        } else {
          const suggerimento = "È uno strumento a corde molto famoso 😉";
          document.getElementById("testoSuggerimento").textContent =
            suggerimento;
        }

        document.getElementById("popupSuggerimento").classList.remove("hidden");
      }

      // Invio risposta
      async function inviaRisposta() {
        const risposta = document.getElementById("inputRisposta").value.trim().toLowerCase();

        if (risposta === "") {
          alert("Inserisci una risposta!");
          return;
        }

        console.log("Risposta:", risposta);
        const rispostaCorretta = await decryptAnswer(
          answers[currentStep].encrypted,
          answers[currentStep].counter
        );

        if (risposta === rispostaCorretta.toLowerCase()){
          currentStep++;
          if (currentStep >= totalSteps){
            showMessage();
          }

          setCounter();
          setQuestion();
          document.getElementById("inputRisposta").value = "";
        }else{
          console.log("Sbagliato ❌");
        }
      }

      async function decryptAnswer(encryptedBase64, counterBase64) {
        const encryptedBytes = Uint8Array.from(atob(encryptedBase64), c => c.charCodeAt(0));
        const counter = Uint8Array.from(atob(counterBase64), c => c.charCodeAt(0));

        const decrypted = await crypto.subtle.decrypt(
            {
                name: "AES-CTR",
                counter: counter,
                length: 64,
            },
            key,
            encryptedBytes
        );

        return dec.decode(decrypted);
      }
    </script>
  </body>
</html>
