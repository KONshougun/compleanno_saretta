<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benvenuta Saretta</title>
    <link rel="stylesheet" href="https://konshougun.github.io/compleanno_saretta/style.css">
</head>

<body>

    <div class="container">
        <h6 class="testo">
            Ciao Saretta adesso faremo un piccolo gioco. <br><br>
            Fin dai primi giorni la musica ci ha legato molto quindi ho deciso di farti un piccolo quiz a tema musica. <br><br>
            Buona fortuna e vediamo se riuscirai a completarlo!!
        </h6>

        <div class="sezione">
            <label>Scegli la difficoltà:</label>
            <div class="radio-group">
                <label><input type="radio" name="difficolta" value="facile" checked> Facile</label>
                <label><input type="radio" name="difficolta" value="media"> Media</label>
                <label><input type="radio" name="difficolta" value="difficile"> Difficile</label>
            </div>
        </div>
        <br>
        <div class="sezione">
            <label>Prima facciamo un test di autenticazione<br>
                Quando ci siamo incontrati per la prima volta??</label>
            <input id="input" type="text" placeholder="gg/mm/aaaa">
        </div>

        <button class="btn" onclick="checkInput()">Invia</button>
    </div>
    <div id="popup" class="popup hidden">
        <div class="popup-content">
            <p>Mhhh sei sicura??</p>
            <button onclick="chiudiPopup()">OK</button>
        </div>
    </div>

    <script src="https://konshougun.github.io/compleanno_saretta/script.js"></script>

</body>
</html>
