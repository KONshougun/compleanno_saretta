<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benvenuta Saretta</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            width: 80%;
            max-width: 375px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .testo {
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .sezione {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        input[type="radio"] {
            margin-right: 8px;
        }

        input[type="text"] {
            width: 95%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background-color: #ff6f91;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #ff4e78;
        }
    </style>
</head>

<body>

    <div class="container">
        <h6 class="testo">
            Ciao Saretta adesso faremo un piccolo gioco. <br><br>
            Fin dai primi giorni la musica ci ha legato molto quindi ho deciso di farti un piccolo quiz a tema musica. <br><br>
            Buona fortuna e vediamo se riuscirai a completarlo!!
        </h6>

        <div class="sezione">
            <label>Scegli la difficoltà:</label>
            <div class="radio-group">
                <label><input type="radio" name="difficolta" value="facile" checked> Facile</label>
                <label><input type="radio" name="difficolta" value="media"> Media</label>
                <label><input type="radio" name="difficolta" value="difficile"> Difficile</label>
            </div>
        </div>
        <br>
        <div class="sezione">
            <label>Quando ci siamo incontrati per la prima volta??</label>
            <input id="input" type="text" placeholder="gg-mm-aaaa">
        </div>

        <button class="btn" onclick="checkInput()">Invia</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
